<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a6ee1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b4cc0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="20" y="40" rx="25" ry="25" width="120" height="120" fill="url(#grad)"/>

  <!-- Bars -->
  <rect x="45" y="90" width="15" height="40" fill="white" rx="4"/>
  <rect x="70" y="75" width="15" height="55" fill="white" rx="4"/>
  <rect x="95" y="60" width="15" height="70" fill="white" rx="4"/>

  <!-- Text -->
  <text x="170" y="120" font-family="Arial, Helvetica, sans-serif" font-size="64" fill="white" font-weight="bold">
    POS STORE
  </text>
</svg>
